<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - BK</title>
<style>
    /* ===== Body & Background ===== */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #6c5ce7, #00b894);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    /* ===== Container ===== */
    .container {
        background: #fff;
        padding: 40px 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        width: 100%;
        max-width: 350px;
        text-align: center;
        transition: transform 0.3s ease;
    }
    .container:hover {
        transform: translateY(-5px);
    }

    /* ===== Heading ===== */
    .container h3 {
        margin-bottom: 25px;
        color: #333;
        font-size: 24px;
        font-weight: 600;
    }

    /* ===== Input Fields ===== */
    input {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 16px;
        transition: border 0.3s ease, box-shadow 0.3s ease;
    }
    input:focus {
        border-color: #6c5ce7;
        box-shadow: 0 0 5px rgba(108,92,231,0.5);
        outline: none;
    }

    /* ===== Button ===== */
    button {
        width: 100%;
        padding: 12px;
        background: #6c5ce7;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.3s ease, transform 0.2s ease;
    }
    button:hover {
        background: #5a4acb;
        transform: translateY(-2px);
    }

    /* ===== Responsive ===== */
    @media (max-width: 400px) {
        .container {
            padding: 30px 20px;
        }
    }
</style>

</head>
<body>

<div class="container">
    <h3>Register</h3>

    <input type="text" id="name" placeholder="Amazina">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <input type="text" id="bkaccount" placeholder="BK Account">

    <button onclick="registerUser()">Ohereza</button>
</div>

<script>
    async function registerUser() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const bkaccount = document.getElementById('bkaccount').value;

        if (!name || !email || !password || !bkaccount) {
            alert("Wibagiwe kuzuzamo bimwe! Uzuza amakuru yose.");
            return; 
        }

        const res = await fetch('/register',{
            method : 'POST',
            headers : { 'Content-Type':'application/json' },
            body: JSON.stringify({name,email,password,bkaccount}) 
        });

        const data = await res.json();

        if (res.ok){
            alert(data.msg);
            window.location.href="/login.html";
        } else {
            alert('Hari ikibazo muri data zawe');
        }
    }
</script>

</body>
</html>
