<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - BK</title>
<style>
    /* ===== Body & Background ===== */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #00b894, #00cec9);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }

    /* ===== Container ===== */
    .container {
        background: #fff;
        padding: 40px 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        width: 100%;
        max-width: 350px;
        text-align: center;
        transition: transform 0.3s ease;
    }
    .container:hover {
        transform: translateY(-5px);
    }

    /* ===== Heading ===== */
    .container h3 {
        margin-bottom: 25px;
        color: #333;
        font-size: 24px;
        font-weight: 600;
    }

    /* ===== Input Fields ===== */
    input {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 16px;
        transition: border 0.3s ease, box-shadow 0.3s ease;
    }
    input:focus {
        border-color: #28a745;
        box-shadow: 0 0 5px rgba(40,167,69,0.5);
        outline: none;
    }

    /* ===== Button ===== */
    button {
        width: 100%;
        padding: 12px;
        background: #28a745;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.3s ease, transform 0.2s ease;
    }
    button:hover {
        background: #218838;
        transform: translateY(-2px);
    }

    /* ===== Link ===== */
    .link {
        margin-top: 15px;
        font-size: 14px;
    }
    .link a {
        color: #28a745;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s ease;
    }
    .link a:hover {
        color: #218838;
        text-decoration: underline;
    }

    /* ===== Responsive ===== */
    @media (max-width: 400px) {
        .container {
            padding: 30px 20px;
        }
    }
</style>
</head>
<body>

<div class="container">
    <h3>Login - Injira</h3>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="loginUser()">Injira</button>

    <div class="link">
        Nta konti ufite? <a href="/register.html">Iyandikishe hano</a>
    </div>
</div>

<script>
async function loginUser() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if (!email || !password) {
        alert("Uzuza email na password byawe!");
        return;
    }

    const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.msg) {
        alert(data.msg);
    }

    localStorage.setItem('userId', data.id);
    localStorage.setItem('role', data.role);

    if (data.role == 'user') {
        window.location.href = 'bank.html';
    } else if (data.role == 'teller') {
        window.location.href = 'teller.html';
    } else if (data.role == 'admin') {
        window.location.href = 'admin.html';
    }
}
</script>

</body>
</html>
